<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoMart</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>

<body class="bg-slate-50 text-slate-800">

<!-- ================= NAVBAR ================= -->
<div class="flex justify-between items-center p-4 bg-white shadow">
  <h1 class="font-bold text-xl text-brand-600">AutoMart</h1>
  <div class="flex gap-4">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('search')">Search Parts</button>
    <button onclick="showPage('dashboard')">Shop Dashboard</button>
    <button onclick="showPage('login')">Log In</button>
    <button onclick="showPage('register')">Register</button>
  </div>
</div>

<!-- ================= HOME ================= -->
<div id="page-home" class="page p-6">

  <h1 class="text-4xl font-bold mb-4">Find Vehicle Parts Instantly</h1>
  <p class="mb-6">Compare prices, check availability, and locate nearby shops.</p>

  <div class="flex gap-2 mb-6">
    <input id="heroSearch" placeholder="Search parts..." class="border p-2 flex-1"/>
    <button onclick="doHeroSearch()" class="bg-blue-600 text-white px-4 py-2">Search</button>
  </div>

</div>

<!-- ================= SEARCH ================= -->
<div id="page-search" class="page hidden p-6">

  <h2 class="text-2xl font-bold mb-4">Search Parts</h2>

  <input id="searchInput" placeholder="Search..." class="border p-2 mb-4"/>
  <button onclick="filterResults()" class="bg-blue-600 text-white px-4 py-2">Search</button>

  <div id="resultsGrid" class="grid grid-cols-3 gap-4 mt-6"></div>
  <div id="emptyState" class="hidden">No Results</div>
  <p id="resultCount"></p>

</div>

<!-- ================= LOGIN ================= -->
<div id="page-login" class="page hidden p-6">

  <h2 class="text-xl mb-4">Login</h2>

  <input type="email" placeholder="Email" class="border p-2 block mb-2"/>
  <input type="password" id="loginPass" placeholder="Password" class="border p-2 block mb-2"/>

  <button onclick="handleLogin()" class="bg-blue-600 text-white px-4 py-2">Login</button>

</div>

<!-- ================= REGISTER ================= -->
<div id="page-register" class="page hidden p-6">

  <h2 class="text-xl mb-4">Register</h2>

  <input type="email" placeholder="Email" class="border p-2 block mb-2"/>
  <input type="password" id="regPass" placeholder="Password" class="border p-2 block mb-2"/>

  <button onclick="handleRegister()" class="bg-blue-600 text-white px-4 py-2">Register</button>

</div>

<!-- ================= DASHBOARD ================= -->
<div id="page-dashboard" class="page hidden p-6">

  <h2 class="text-xl mb-4">Add Part</h2>

  <input id="partName" placeholder="Part Name" class="border p-2 block mb-2"/>
  <input id="partPrice" type="number" placeholder="Price" class="border p-2 block mb-2"/>

  <select id="partCat" class="border p-2 mb-2">
    <option>Engine</option>
    <option>Brakes</option>
  </select>

  <label><input type="radio" name="avail" value="In Stock" checked/> In Stock</label>

  <button onclick="addPart()" class="bg-green-600 text-white px-4 py-2 block mt-2">
    Add Part
  </button>

</div>

<!-- ================= JS ================= -->
<script src="script.js"></script>

</body>
</html>
