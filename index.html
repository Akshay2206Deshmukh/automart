<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMart</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar">
  <div class="nav-container">

    <div class="logo">🚗 AutoMart</div>

    <div class="search-container">
      <input id="search" type="text" class="search-bar" placeholder="Search parts...">
      <button class="search-btn" onclick="searchParts()">🔍 Search</button>
    </div>

    <div class="user-section">
      <span id="user" class="user-email">Not logged in</span>
      <button class="auth-btn" onclick="logout()">Logout</button>
    </div>

  </div>
</nav>

<!-- 🔥 HERO -->
<section class="hero">
  <h1>Find Perfect Spare Parts</h1>
  <p>Discover premium quality car parts from trusted sellers.</p>
</section>

<!-- 🔥 PRODUCTS -->
<section class="products-section">
  <h2 class="section-title">Available Parts</h2>

  <!-- Dynamic Data -->
  <div id="results" class="products-grid"></div>

  <!-- Empty State -->
  <p id="noData" style="text-align:center; display:none;">No parts available</p>
</section>

<!-- 🔥 ADD PART -->
<section class="add-part-section">
  <h2>Add New Part</h2>

  <div class="form-group">
    <label>Part Name</label>
    <input id="partName" type="text" placeholder="Brake Pads">
  </div>

  <div class="form-group">
    <label>Price</label>
    <input id="partPrice" type="number" placeholder="₹">
  </div>

  <div class="form-group">
    <label>Shop Name</label>
    <input id="shopName" type="text" placeholder="Shop Name">
  </div>

  <button class="add-part-btn" onclick="addPart()">🚀 Add Part</button>
</section>

<!-- 🔥 FOOTER -->
<footer style="text-align:center; padding:20px; opacity:0.7;">
  © 2026 AutoMart | Built by Akshay 🚀
</footer>

<!-- 🔥 SCRIPT -->
<script type="module" src="script.js"></script>

</body>
</html>
