<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo">🚗 AutoMart</div>

    <div class="search-container">
      <input id="search" placeholder="Search parts...">
      <button onclick="searchParts()">🔍</button>
    </div>

    <div>
      <span id="user">Not logged in</span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<section class="auth-section">
  <h2>Login / Register</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</section>

<section class="hero">
  <h1>Find Perfect Spare Parts</h1>
</section>

<section>
  <h2 class="center">Nearby Shops</h2>
  <div id="map"></div>
</section>

<section>
  <h2 class="center">Products</h2>
  <div id="results" class="grid"></div>
</section>

<!-- 🛒 CART -->
<section>
  <h2 class="center">Cart</h2>
  <div id="cartItems" class="grid"></div>
  <h3 id="total" class="center">Total: ₹0</h3>

  <button onclick="checkout()" class="checkout-btn">💳 Checkout</button>
</section>

<!-- 💳 CHECKOUT POPUP -->
<div id="checkoutBox" class="checkout-box">
  <h2>Order Summary</h2>
  <div id="orderDetails"></div>
  <h3 id="finalTotal"></h3>

  <button onclick="confirmOrder()">✅ Pay Now</button>
  <button onclick="closeCheckout()">❌ Cancel</button>
</div>

<section>
  <h2 class="center">Add Part</h2>
  <input id="partName" placeholder="Part Name">
  <input id="partPrice" type="number" placeholder="Price">
  <input id="shopName" placeholder="Shop Name">
  <button onclick="addPart()">Add Part</button>
</section>

<script>
function initMap() {
  const loc = { lat: 19.2183, lng: 72.9781 };
  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: loc,
  });
  new google.maps.Marker({ position: loc, map: map });
}
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyByDzRHN7eHPEF-RMwieGISejLBQSAfruo&callback=initMap"></script>
<script type="module" src="script.js"></script>

</body>
</html>
