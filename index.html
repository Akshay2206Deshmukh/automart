<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMart</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">🚗 AutoMart</div>

    <div class="search-container">
      <input id="search" type="text" placeholder="Search parts...">
      <button onclick="searchParts()">🔍 Search</button>
    </div>

    <div>
      <span id="user">Not logged in</span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- 🔐 LOGIN -->
<section class="auth-section">
  <h2>Login / Register</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <div>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</section>

<!-- HERO -->
<section class="hero">
  <h1>Find Perfect Spare Parts</h1>
  <p>Premium quality parts from trusted sellers</p>
</section>

<!-- MAP -->
<section>
  <h2 style="text-align:center;">Nearby Shops</h2>
  <div id="map"></div>
</section>

<!-- PRODUCTS -->
<section>
  <h2>Available Parts</h2>
  <div id="results" class="grid"></div>
</section>

<!-- ADD PART -->
<section>
  <h2>Add Part</h2>
  <input id="partName" placeholder="Part Name">
  <input id="partPrice" type="number" placeholder="Price">
  <input id="shopName" placeholder="Shop Name">
  <button onclick="addPart()">Add Part</button>
</section>

<!-- MAP SCRIPT -->
<script>
function initMap() {
  const loc = { lat: 19.2183, lng: 72.9781 };

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: loc,
  });

  new google.maps.Marker({
    position: loc,
    map: map
  });
}
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyByDzRHN7eHPEF-RMwieGISejLBQSAfruo&callback=initMap"></script>

<!-- FIREBASE SCRIPT -->
<script type="module" src="script.js"></script>

</body>
</html>
