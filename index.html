<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMart</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">🚗 AutoMart</div>

    <div class="search-container">
      <input id="search" type="text" placeholder="Search parts...">
      <button onclick="searchParts()">🔍</button>
    </div>

    <div>
      <span id="user">Not logged in</span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- LOGIN -->
<section class="auth-section">
  <h2>Login / Register</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</section>

<!-- HERO -->
<section class="hero">
  <h1>Find Perfect Spare Parts</h1>
</section>

<!-- MAP -->
<section>
  <h2 class="center">Nearby Shops</h2>
  <div id="map"></div>
</section>

<!-- PRODUCTS -->
<section>
  <h2 class="center">Products</h2>
  <div id="results" class="grid"></div>
</section>

<!-- CART -->
<section class="center">
  <h2>🛒 Your Cart</h2>
  <div id="cart"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="checkout()">Proceed to Checkout</button>
</section>

<!-- ADD PART -->
<section class="center">
  <h2>Add New Part</h2>

  <input id="partName" placeholder="Part Name">
  <input id="partPrice" type="number" placeholder="Price">
  <input id="shopName" placeholder="Shop Name">

  <button onclick="addPart()">Add Part</button>
</section>

<!-- MAP SCRIPT -->
<script>
function initMap() {
  const loc = { lat: 19.2183, lng: 72.9781 };

  window.map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: loc,
  });

  new google.maps.Marker({
    position: loc,
    map: window.map
  });

  if (window.loadMapParts) {
    window.loadMapParts();
  }
}
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyByDzRHN7eHPEF-RMwieGISejLBQSAfruo&callback=initMap"></script>

<script type="module" src="script.js"></script>

</body>
</html>
