<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMart Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2>🚗 AutoMart</h2>
  <input id="search" placeholder="Search parts...">
  <span id="user">Not logged in</span>
  <button onclick="logout()">Logout</button>
</nav>

<!-- AUTH -->
<section class="auth">
  <h2>Login / Register</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <div class="auth-btns">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</section>

<!-- HERO -->
<section class="hero">
  <h1>Find Spare Parts Easily 🚀</h1>
</section>

<!-- PRODUCTS -->
<section>
  <h2 class="center">Products</h2>
  <div id="results" class="grid"></div>
</section>

<!-- CART -->
<div id="cart" class="cart">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3>Total ₹<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<button class="cartBtn" onclick="toggleCart()">🛒</button>

<!-- ADD PART -->
<section class="add">
  <h2>Add Part</h2>
  <input id="partName" placeholder="Part Name">
  <input id="partPrice" placeholder="Price">
  <input id="shopName" placeholder="Shop Name">
  <input id="partImage" placeholder="Image URL">
  <button onclick="addPart()">Add Part</button>
</section>

<!-- CHATBOT -->
<div id="chatbot">
  <div id="chat-header" onclick="toggleChat()">🤖 AI</div>
  <div id="chat-body">
    <div id="chat-messages"></div>
    <input id="chatInput">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
