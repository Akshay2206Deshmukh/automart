<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoMart – Smart Vehicle Parts Platform</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- 🔥 FIREBASE (IMPORTANT ADD) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

</head>

<body class="font-body bg-gray-100 text-gray-900">

<!-- SIMPLE TEST NAV -->
<nav class="bg-white p-4 shadow flex justify-between">
  <h1 class="font-bold text-blue-600">AutoMart</h1>
  <div>
    <button onclick="showPage('home')" class="mr-4">Home</button>
    <button onclick="showPage('search')" class="mr-4">Search</button>
    <button onclick="showPage('login')" class="mr-4">Login</button>
    <button onclick="showPage('register')">Register</button>
  </div>
</nav>

<!-- HOME -->
<div id="page-home" class="page p-6">
  <h2 class="text-2xl font-bold mb-4">Home Page</h2>
</div>

<!-- SEARCH -->
<div id="page-search" class="page hidden p-6">
  <h2 class="text-xl mb-4">Search Parts</h2>

  <input id="searchInput" placeholder="Search..." class="border p-2"/>
  <button onclick="filterResults()" class="bg-blue-600 text-white px-4 py-2">Search</button>

  <div id="resultsGrid" class="mt-4"></div>
  <div id="emptyState" class="hidden">No Results</div>
  <p id="resultCount"></p>
</div>

<!-- LOGIN -->
<div id="page-login" class="page hidden p-6">
  <h2>Login</h2>
  <input type="email" placeholder="Email" class="border p-2 block mb-2"/>
  <input type="password" id="loginPass" placeholder="Password" class="border p-2 block mb-2"/>
  <button onclick="handleLogin()" class="bg-blue-600 text-white px-4 py-2">Login</button>
</div>

<!-- REGISTER -->
<div id="page-register" class="page hidden p-6">
  <h2>Register</h2>
  <input type="email" placeholder="Email" class="border p-2 block mb-2"/>
  <input type="password" id="regPass" placeholder="Password" class="border p-2 block mb-2"/>
  <button onclick="handleRegister()" class="bg-blue-600 text-white px-4 py-2">Register</button>
</div>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page hidden p-6">
  <h2>Add Part</h2>
  <input id="partName" placeholder="Part Name" class="border p-2 block mb-2"/>
  <input id="partPrice" placeholder="Price" type="number" class="border p-2 block mb-2"/>

  <select id="partCat" class="border p-2 mb-2">
    <option>Engine</option>
  </select>

  <label><input type="radio" name="avail" value="In Stock" checked/> In Stock</label>

  <button onclick="addPart()" class="bg-green-600 text-white px-4 py-2 block mt-2">
    Add Part
  </button>
</div>

<!-- 🔥 YOUR JS -->
<script src="script.js"></script>

</body>
</html>
